name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read

jobs:
  test:
    name: Test, vet, and build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Check formatting
        shell: bash
        run: |
          unformatted="$(gofmt -l .)"
          if [[ -n "$unformatted" ]]; then
            echo "The following files are not formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: Run Go tests with coverage
        shell: bash
        run: |
          set -euo pipefail
          go test ./... -count=1 -covermode=atomic -coverprofile=coverage.out

          coverage="$(
            go tool cover -func=coverage.out |
              awk '$1 == "total:" { gsub(/%/, "", $3); print $3 }'
          )"
          if [[ -z "$coverage" ]]; then
            echo "Unable to determine total Go test coverage."
            exit 1
          fi

          echo "Total Go test coverage: ${coverage}%"
          awk -v coverage="$coverage" 'BEGIN { exit !(coverage + 0 >= 85) }' || {
            echo "Go test coverage ${coverage}% is below the required 85%."
            exit 1
          }

      - name: Run Python renderer tests
        run: python -m unittest internal/visualization/visualize_report_test.py

      - name: Run static analysis
        run: go vet ./...

      - name: Build command
        run: go build ./cmd/log-tool
